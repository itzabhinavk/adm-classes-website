<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Teacher Registration | ADM Classes</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
  <style>
    body { font-family: 'Poppins', sans-serif; margin:0; background:#eef2ff; color:#111827; }
    .page-shell { max-width: 500px; margin: 40px auto; padding: 24px 20px; }
    .form-card { background:#fff; border:1px solid #dbeafe; border-radius:20px; padding:32px; box-shadow:0 15px 30px rgba(15,23,42,0.05); }
    .form-card h1 { margin:0 0 8px; font-size:28px; text-align:center; }
    .form-card .subtitle { color:#64748b; text-align:center; margin-bottom:24px; }
    .form-group { margin-bottom:20px; }
    .form-group label { display:block; margin-bottom:6px; font-weight:600; color:#374151; }
    .form-group input, .form-group select, .form-group textarea { width:100%; padding:12px 16px; border:1px solid #d1d5db; border-radius:8px; font-size:14px; }
    .form-group textarea { resize:vertical; min-height:80px; }
    .btn { width:100%; padding:14px; background:#1d4ed8; color:#fff; border:none; border-radius:8px; font-size:16px; font-weight:600; cursor:pointer; transition:all .2s ease; }
    .btn:hover { background:#1e40af; }
    .role-tabs { display:flex; margin-bottom:24px; border-radius:8px; overflow:hidden; border:1px solid #d1d5db; }
    .role-tab { flex:1; padding:12px; text-align:center; background:#f3f4f6; border:none; cursor:pointer; transition:all .2s ease; }
    .role-tab.active { background:#1d4ed8; color:#fff; }
    .terms { display:flex; align-items:center; gap:8px; margin-bottom:20px; }
    .terms input { width:auto; }
    .terms label { margin:0; font-size:14px; }
    .login-link { text-align:center; margin-top:20px; }
    .login-link a { color:#1d4ed8; text-decoration:none; }
    .login-link a:hover { text-decoration:underline; }
    .subjects-grid { display:grid; grid-template-columns: repeat(2, 1fr); gap:8px; }
    .subject-checkbox { display:flex; align-items:center; gap:8px; }
    .subject-checkbox input { width:auto; }
    .subject-checkbox label { margin:0; font-size:14px; }
  </style>
</head>
<body>
  <div class="page-shell">
    <div class="form-card">
      <h1>Teacher Registration</h1>
      <p class="subtitle">Join ADM Classes as a teacher</p>

      <form method="POST" action="{{ url_for('auth.teacher_register') }}">
        <div class="form-group">
          <label for="name">Full Name *</label>
          <input type="text" id="name" name="name" required>
        </div>

        <div class="form-group">
          <label for="email">Email Address *</label>
          <input type="email" id="email" name="email" required>
        </div>

        <div class="form-group">
          <label for="phone">Phone Number</label>
          <input type="tel" id="phone" name="phone">
        </div>

        <div class="form-group">
          <label for="password">Password *</label>
          <input type="password" id="password" name="password" required minlength="8">
        </div>

        <div class="form-group">
          <label for="confirm_password">Confirm Password *</label>
          <input type="password" id="confirm_password" name="confirm_password" required>
        </div>

        <div class="form-group">
          <label>Subjects You Can Teach *</label>
          <div class="subjects-grid">
            <div class="subject-checkbox">
              <input type="checkbox" id="science" name="subjects" value="Science">
              <label for="science">Science</label>
            </div>
            <div class="subject-checkbox">
              <input type="checkbox" id="physics" name="subjects" value="Physics">
              <label for="physics">Physics</label>
            </div>
            <div class="subject-checkbox">
              <input type="checkbox" id="chemistry" name="subjects" value="Chemistry">
              <label for="chemistry">Chemistry</label>
            </div>
            <div class="subject-checkbox">
              <input type="checkbox" id="maths" name="subjects" value="Mathematics">
              <label for="maths">Mathematics</label>
            </div>
            <div class="subject-checkbox">
              <input type="checkbox" id="english" name="subjects" value="English">
              <label for="english">English</label>
            </div>
            <div class="subject-checkbox">
              <input type="checkbox" id="hindi" name="subjects" value="Hindi">
              <label for="hindi">Hindi</label>
            </div>
          </div>
        </div>

        <div class="form-group">
          <label for="experience">Teaching Experience (Optional)</label>
          <textarea id="experience" name="experience" placeholder="Tell us about your teaching experience..."></textarea>
        </div>

        <div class="terms">
          <input type="checkbox" id="agree_terms" name="agree_terms" required>
          <label for="agree_terms">I agree to the Terms & Conditions</label>
        </div>

        <button type="submit" class="btn">Register as Teacher</button>
      </form>

      <div class="login-link">
        <p>Already have an account? <a href="{{ url_for('auth.login') }}">Login here</a></p>
      </div>
    </div>
  </div>
</body>
</html>
