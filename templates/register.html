<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>ADM Classes - Register</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <link rel="stylesheet" href="../../static/css/style.css" />
    <style>
        .register-container {
            display: flex;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .register-left {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.1), rgba(118, 75, 162, 0.1));
        }

        .register-content {
            color: white;
            max-width: 500px;
        }

        .register-content h1 {
            font-size: 48px;
            font-weight: 700;
            margin-bottom: 20px;
            line-height: 1.2;
        }

        .register-content p {
            font-size: 18px;
            line-height: 1.6;
            opacity: 0.95;
            margin-bottom: 30px;
        }

        .benefits-list {
            list-style: none;
        }

        .benefits-list li {
            margin: 15px 0;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 16px;
        }

        .benefits-list i {
            color: #22b573;
            font-size: 20px;
            width: 24px;
        }

        .register-right {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            background: var(--page-bg);
        }

        .register-box {
            width: 100%;
            max-width: 450px;
            background: var(--card-bg);
            padding: 50px 40px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            max-height: 90vh;
            overflow-y: auto;
        }

        .register-header {
            text-align: center;
            margin-bottom: 35px;
        }

        .register-header .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .register-header .logo img {
            height: 40px;
        }

        .register-header h2 {
            font-size: 28px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 8px;
        }

        .register-header p {
            color: var(--normal-text);
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .form-row .form-group {
            margin-bottom: 0;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--text);
            margin-bottom: 6px;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 11px 13px;
            border: 1.5px solid #e0e0e0;
            border-radius: 8px;
            font-size: 13px;
            font-family: 'Poppins', sans-serif;
            background: var(--card-bg);
            color: var(--text);
            transition: all 0.3s ease;
        }

        body.dark-mode .form-group input,
        body.dark-mode .form-group select {
            border-color: #444;
            background: #3a3a3a;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(0, 123, 255, 0.1);
        }

        .form-group input::placeholder {
            color: var(--normal-text);
        }

        .password-strength {
            margin-top: 8px;
            height: 4px;
            background: #e0e0e0;
            border-radius: 2px;
            overflow: hidden;
        }

        .strength-meter {
            height: 100%;
            width: 0;
            background: #dc3545;
            transition: all 0.3s;
        }

        .terms-checkbox {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            margin: 20px 0;
            font-size: 13px;
            color: var(--normal-text);
        }

        .terms-checkbox input[type="checkbox"] {
            width: auto;
            margin-top: 2px;
            cursor: pointer;
            accent-color: var(--primary);
        }

        .terms-checkbox a {
            color: var(--primary);
            text-decoration: none;
        }

        .terms-checkbox a:hover {
            text-decoration: underline;
        }

        .register-btn {
            width: 100%;
            padding: 12px 0;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 15px;
        }

        .register-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 123, 255, 0.4);
        }

        .register-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .login-link {
            text-align: center;
            font-size: 13px;
            color: var(--normal-text);
        }

        .login-link a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }

        .toggle-mode-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: var(--card-bg);
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 8px var(--shadow-color);
            transition: all 0.3s;
        }

        .toggle-mode-btn:hover {
            transform: scale(1.1);
        }

        .role-selector {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 25px;
        }

        .role-option {
            position: relative;
        }

        .role-option input[type="radio"] {
            display: none;
        }

        .role-label {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px;
            border: 1.5px solid #e0e0e0;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 13px;
            background: var(--card-bg);
            color: var(--text);
        }

        body.dark-mode .role-label {
            border-color: #444;
        }

        .role-option input[type="radio"]:checked + .role-label {
            background: linear-gradient(135deg, rgba(0, 123, 255, 0.1), rgba(0, 86, 179, 0.1));
            border-color: var(--primary);
            font-weight: 600;
        }

        @media (max-width: 992px) {
            .register-left {
                flex: 0.4;
                padding: 30px 20px;
            }

            .register-content h1 {
                font-size: 36px;
            }

            .register-content p {
                font-size: 15px;
            }

            .benefits-list {
                display: none;
            }
        }

        @media (max-width: 768px) {
            .register-container {
                flex-direction: column;
            }

            .register-left {
                padding: 40px 20px;
                text-align: center;
                min-height: 250px;
            }

            .register-right {
                padding: 30px 20px;
            }

            .register-box {
                padding: 40px 25px;
                max-width: 100%;
            }

            .register-content h1 {
                font-size: 32px;
            }

            .form-row {
                grid-template-columns: 1fr;
            }

            .role-selector {
                grid-template-columns: 1fr;
            }
        }

        .error-message {
            background: #fee;
            color: #c00;
            padding: 10px 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 13px;
            border-left: 3px solid #c00;
        }

        body.dark-mode .error-message {
            background: rgba(204, 0, 0, 0.1);
            color: #ff6b6b;
            border-left-color: #ff6b6b;
        }
    </style>
</head>
<body>
    <button class="toggle-mode-btn" onclick="toggleMode()">🌙</button>

    <div class="register-container">
        <!-- Left Side - Brand Info -->
        <div class="register-left">
            <div class="register-content">
                <h1>Join ADM Classes</h1>
                <p>Start your learning journey with our comprehensive platform</p>
                <ul class="benefits-list">
                    <li><i class="fas fa-check-circle"></i> Free access to courses</li>
                    <li><i class="fas fa-check-circle"></i> Expert instruction</li>
                    <li><i class="fas fa-check-circle"></i> Flexible learning</li>
                    <li><i class="fas fa-check-circle"></i> Progress tracking</li>
                </ul>
            </div>
        </div>

        <!-- Right Side - Register Form -->
        <div class="register-right">
            <div class="register-box">
                <div class="register-header">
                    <div class="logo">
                        <img src="../../static/images/logo.png" alt="ADM Logo" onError="this.style.display='none'"/>
                        <span style="font-weight: 700; font-size: 18px;">ADM</span>
                    </div>
                    <h2>Create Account</h2>
                    <p>Join our learning community</p>
                </div>

                {% if error %}
                <div class="error-message">
                    <i class="fas fa-exclamation-circle"></i> {{ error }}
                </div>
                {% endif %}

                <form method="POST">
                    <!-- Role Selection -->
                    <label style="display: block; font-size: 12px; font-weight: 500; color: var(--normal-text); margin-bottom: 10px;">Register as:</label>
                    <div class="role-selector">
                        <div class="role-option">
                            <input type="radio" id="student" name="role" value="student" checked required />
                            <label for="student" class="role-label"><i class="fas fa-graduation-cap"></i> Student</label>
                        </div>
                        <div class="role-option">
                            <input type="radio" id="teacher" name="role" value="teacher" required />
                            <label for="teacher" class="role-label"><i class="fas fa-chalkboard-user"></i> Teacher</label>
                        </div>
                    </div>

                    <!-- Full Name -->
                    <div class="form-row">
                        <div class="form-group">
                            <label for="first_name">First Name</label>
                            <input type="text" id="first_name" name="first_name" placeholder="John" required />
                        </div>
                        <div class="form-group">
                            <label for="last_name">Last Name</label>
                            <input type="text" id="last_name" name="last_name" placeholder="Doe" required />
                        </div>
                    </div>

                    <!-- Email -->
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" name="email" placeholder="your.email@example.com" required />
                    </div>

                    <!-- Phone -->
                    <div class="form-group">
                        <label for="phone">Phone Number</label>
                        <input type="tel" id="phone" name="phone" placeholder="+1 (555) 123-4567" />
                    </div>

                    <!-- Password -->
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" placeholder="At least 8 characters" required />
                        <div class="password-strength">
                            <div class="strength-meter" id="strengthMeter"></div>
                        </div>
                    </div>

                    <!-- Confirm Password -->
                    <div class="form-group">
                        <label for="confirm_password">Confirm Password</label>
                        <input type="password" id="confirm_password" name="confirm_password" placeholder="Re-enter password" required />
                    </div>

                    <!-- Terms & Conditions -->
                    <label class="terms-checkbox">
                        <input type="checkbox" name="agree_terms" required />
                        <span>I agree to the <a href="#" target="_blank">Terms & Conditions</a> and <a href="#" target="_blank">Privacy Policy</a></span>
                    </label>

                    <!-- Register Button -->
                    <button type="submit" class="register-btn">
                        <i class="fas fa-user-plus"></i> Create Account
                    </button>
                </form>

                <!-- Login Link -->
                <div class="login-link">
                    Already have an account? <a href="/login">Login here</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        function toggleMode() {
            document.body.classList.toggle('dark-mode');
            localStorage.setItem('darkMode', document.body.classList.contains('dark-mode'));
        }

        // Load dark mode preference
        if (localStorage.getItem('darkMode') === 'true') {
            document.body.classList.add('dark-mode');
        }

        // Password strength indicator
        document.getElementById('password').addEventListener('input', function() {
            const password = this.value;
            const meter = document.getElementById('strengthMeter');
            let strength = 0;

            if (password.length > 0) strength = 20;
            if (password.length >= 8) strength = 40;
            if (/[a-z]/.test(password) && /[A-Z]/.test(password)) strength = 60;
            if (/[0-9]/.test(password)) strength = 80;
            if (/[^a-zA-Z0-9]/.test(password)) strength = 100;

            meter.style.width = strength + '%';
            meter.style.background = 
                strength < 40 ? '#dc3545' : 
                strength < 70 ? '#ffc107' : 
                '#28a745';
        });

        // Form validation
        document.querySelector('form').addEventListener('submit', function(e) {
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm_password').value;

            if (password !== confirmPassword) {
                e.preventDefault();
                alert('Passwords do not match');
            }

            if (password.length < 8) {
                e.preventDefault();
                alert('Password must be at least 8 characters');
            }
        });
    </script>
</body>
</html>
