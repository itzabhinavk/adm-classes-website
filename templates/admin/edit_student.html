<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edit Student | ADM Admin</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:Arial,sans-serif;
  background:#f4f6f8;
  padding:30px;
}
.card{
  max-width:500px;
  margin:0 auto;
  background:#fff;
  border-radius:10px;
  padding:25px;
  box-shadow:0 4px 15px rgba(0,0,0,.08);
}
h2{
  margin-bottom:20px;
  color:#111827;
}
label{
  display:block;
  margin-bottom:8px;
  color:#374151;
  font-weight:600;
}
input{
  width:100%;
  padding:10px;
  margin-bottom:16px;
  border:1px solid #d1d5db;
  border-radius:6px;
}
.actions{
  display:flex;
  gap:10px;
}
button,a{
  display:inline-block;
  text-decoration:none;
  border:none;
  border-radius:6px;
  padding:10px 14px;
  font-weight:600;
  cursor:pointer;
}
button{
  background:#2563eb;
  color:#fff;
}
a{
  background:#e5e7eb;
  color:#111827;
}
</style>
</head>
<body>
  <div class="card">
    <h2>Edit Student</h2>
    <form method="POST">
      <label for="name">Name</label>
      <input id="name" name="name" type="text" value="{{ student.name }}" required>

      <label for="email">Email</label>
      <input id="email" name="email" type="email" value="{{ student.email }}" required>

      <div class="actions">
        <button type="submit">Update Student</button>
        <a href="{{ url_for('admin.students') }}">Cancel</a>
      </div>
    </form>
  </div>
</body>
</html>
