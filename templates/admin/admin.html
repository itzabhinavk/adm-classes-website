
<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width,initial-scale=1" />
	<title>Admin Dashboard</title>
	<link rel="stylesheet" href="../../static/css/admin.css">
</head>
<body>
	<div class="admin-app">
		<aside class="sidebar" id="sidebar">
			<div class="brand">ADM Classes</div>
			<nav>
				<a href="#" class="active" data-section="dashboard">Dashboard</a>
				<a href="#" data-section="students">Students</a>
				<a href="#" data-section="courses">Courses</a>
				<a href="#" data-section="quizzes">Quizzes</a>
				<a href="#" data-section="videos">Videos</a>
				<a href="#" data-section="settings">Settings</a>
			</nav>  
			<div class="sidebar-footer">Logged in as Admin</div>
		</aside>

		<div class="main">
			<header class="topbar">
				<button id="toggleBtn" class="toggle">☰</button>
				<h1 id="pageTitle">Dashboard</h1>
				<div class="profile">Admin</div>
			</header>

			<section class="content">
				<div class="cards">
					<div class="card">
						<h3>Students</h3>
						<p class="stat" id="studentsCount">0</p>
					</div>
					<div class="card">
						<h3>Courses</h3>
						<p class="stat" id="coursesCount">0</p>
					</div>
					<div class="card">
						<h3>Quizzes</h3>
						<p class="stat" id="quizzesCount">0</p>
					</div>
				</div>

				<div id="panelContainer">
					<div class="panel">
					<h2>Recent Activity</h2>
					<table>
						<thead>
							<tr><th>Time</th><th>User</th><th>Action</th></tr>
						</thead>
						<tbody id="activityBody">
							<tr><td colspan="3">No activity yet.</td></tr>
						</tbody>
					</table>
					</div>
				</div>
			</section>

			<footer class="footer">© ADM Classes</footer>
		</div>
	</div>

	<script src="../../static/js/admin.js" defer></script>
</body>
</html>
