<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Edit Course | ADM Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
  <style>
    body { font-family: 'Poppins', sans-serif; margin:0; background:#eef2ff; color:#111827; }
    .page-shell { max-width: 800px; margin: 0 auto; padding: 24px 20px; }
    .top-bar { display:flex; justify-content:space-between; align-items:flex-end; flex-wrap:wrap; gap:18px; margin-bottom:20px; }
    .top-bar h1 { margin:0; font-size:30px; }
    .top-bar .subtitle { color:#475569; margin-top:6px; }
    .nav-links { display:flex; flex-wrap:wrap; gap:12px; margin-bottom:24px; }
    .nav-links a { text-decoration:none; color:#475569; background:#fff; border:1px solid #dbeafe; padding:10px 16px; border-radius:999px; transition:all .2s ease; }
    .nav-links a.active, .nav-links a:hover { color:#1d4ed8; background:#eff6ff; border-color:#bfdbfe; }
    .form-card { background:#fff; border:1px solid #dbeafe; border-radius:20px; padding:32px; box-shadow:0 15px 30px rgba(15,23,42,0.05); }
    .form-section { margin-bottom:28px; }
    .form-section h3 { margin:0 0 16px; font-size:18px; color:#1e293b; }
    .form-row { display:grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap:16px; margin-bottom:20px; }
    .form-group { }
    .form-group label { display:block; margin-bottom:6px; font-weight:600; color:#374151; }
    .form-group input, .form-group select, .form-group textarea { width:100%; padding:12px 16px; border:1px solid #d1d5db; border-radius:8px; font-size:14px; }
    .form-group textarea { resize:vertical; min-height:80px; }
    .btn-group { display:flex; gap:12px; margin-top:24px; }
    .btn { padding:12px 24px; border-radius:8px; text-decoration:none; font-size:14px; font-weight:500; border:none; cursor:pointer; transition:all .2s; flex:1; text-align:center; }
    .btn-primary { background:#10b981; color:#fff; }
    .btn-primary:hover { background:#059669; }
    .btn-secondary { background:#6b7280; color:#fff; }
    .btn-secondary:hover { background:#4b5563; }
  </style>
</head>
<body>
  <div class="page-shell">
    <div class="top-bar">
      <div>
        <h1>Edit Course</h1>
        <p class="subtitle">Update course information</p>
      </div>
      <div>{{ user_name }}</div>
    </div>

    <div class="nav-links">
      <a href="{{ url_for('admin.dashboard') }}">Dashboard</a>
      <a href="{{ url_for('admin.courses') }}" class="active">Courses</a>
      <a href="{{ url_for('admin.student_requests') }}">Student Requests</a>
      <a href="{{ url_for('admin.pending_teachers') }}">Pending Teachers</a>
      <a href="{{ url_for('admin.assign_teacher') }}">Assign Teachers</a>
      <a href="{{ url_for('admin.students') }}">Students</a>
      <a href="{{ url_for('admin.teachers') }}">Teachers</a>
    </div>

    <div class="form-card">
      <form method="POST">
        <div class="form-section">
          <h3>Course Information</h3>
          <div class="form-row">
            <div class="form-group">
              <label for="title">Course Title *</label>
              <input type="text" id="title" name="title" value="{{ course.title }}" placeholder="e.g., Class 10th - Science" required>
            </div>
            <div class="form-group">
              <label for="category">Category *</label>
              <select id="category" name="category" required>
                <option value="">Select category...</option>
                <option value="Science" {% if course.category == 'Science' %}selected{% endif %}>Science</option>
                <option value="Physics" {% if course.category == 'Physics' %}selected{% endif %}>Physics</option>
                <option value="Chemistry" {% if course.category == 'Chemistry' %}selected{% endif %}>Chemistry</option>
                <option value="Mathematics" {% if course.category == 'Mathematics' %}selected{% endif %}>Mathematics</option>
                <option value="Biology" {% if course.category == 'Biology' %}selected{% endif %}>Biology</option>
                <option value="English" {% if course.category == 'English' %}selected{% endif %}>English</option>
                <option value="Hindi" {% if course.category == 'Hindi' %}selected{% endif %}>Hindi</option>
                <option value="Other" {% if course.category == 'Other' %}selected{% endif %}>Other</option>
              </select>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="level">Level *</label>
              <select id="level" name="level" required>
                <option value="">Select level...</option>
                <option value="8th" {% if course.level == '8th' %}selected{% endif %}>8th Class</option>
                <option value="9th" {% if course.level == '9th' %}selected{% endif %}>9th Class</option>
                <option value="10th" {% if course.level == '10th' %}selected{% endif %}>10th Class</option>
                <option value="11th" {% if course.level == '11th' %}selected{% endif %}>11th Class</option>
                <option value="12th" {% if course.level == '12th' %}selected{% endif %}>12th Class</option>
                <option value="polytechnic" {% if course.level == 'polytechnic' %}selected{% endif %}>polytechnic</option>
                <option value="skills based" {% if course.level == 'skills based' %}selected{% endif %}>skills based</option>
                <option value="job perspective" {% if course.level == 'job perspective' %}selected{% endif %}>job perspective</option>
                <option value="Competitive" {% if course.level == 'Competitive' %}selected{% endif %}>Competitive Exams</option>
              </select>
            </div>
            <div class="form-group">
              <label for="price">Price (₹) *</label>
              <input type="number" id="price" name="price" value="{{ course.price }}" placeholder="0.00" step="0.01" min="0" required>
            </div>
          </div>

          <div class="form-group">
            <label for="description">Description *</label>
            <textarea id="description" name="description" placeholder="Detailed course description..." required>{{ course.description }}</textarea>
          </div>
        </div>

        <div class="btn-group">
          <button type="submit" class="btn btn-primary">Update Course</button>
          <a href="{{ url_for('admin.courses') }}" class="btn btn-secondary">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</body>
</html>
