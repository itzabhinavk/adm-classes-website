<body>

<div class="wrapper">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h2>ADM Admin</h2>
    <a href="dashboard.html">Dashboard</a>
    <a class="active" href="#">Courses</a>
    <a href="teachers.html">Teachers</a>
    <a href="students.html">Students</a>
    <a href="settings.html">Settings</a>    
  </div>

  <!-- MAIN -->
  <div class="main">

    <div class="topbar">
      <h3>Course Management</h3>
      <button class="btn" onclick="openModal()">+ Add Course</button>
    </div>

    <!-- TABLE -->
    <div class="table-box">
      <table id="courseTable">
        <thead>
          <tr>
            <th>#</th>
            <th>Course Name</th>
            <th>Price (₹)</th>
            <th>Status</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>1</td>
            <td>Physics Class 12</td>
            <td>2199</td>
            <td>Active</td>
            <td>
              <button class="action-btn edit" onclick="editCourse(this)">Edit</button>
              <button class="action-btn delete" onclick="deleteCourse(this)">Delete</button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

  </div>
</div>

<!-- MODAL -->
<div class="modal" id="courseModal">
  <div class="modal-content">
    <h3 id="modalTitle">Add Course</h3>
    <input type="text" id="courseName" placeholder="Course Name">
    <input type="number" id="coursePrice" placeholder="Price">
    <textarea id="courseDesc" placeholder="Short Description"></textarea>

    <div class="modal-actions">
      <button class="btn close" onclick="closeModal()">Cancel</button>
      <button class="btn" onclick="saveCourse()">Save</button>
    </div>
  </div>
</div>

<script>
let editRow = null;

function openModal(){
  document.getElementById("courseModal").style.display="flex";
}

function closeModal(){
  document.getElementById("courseModal").style.display="none";
  editRow=null;
  document.getElementById("courseName").value="";
  document.getElementById("coursePrice").value="";
  document.getElementById("courseDesc").value="";
}

function saveCourse(){
  const name = courseName.value.trim();
  const price = coursePrice.value.trim();

  if(name=="" || price==""){
    alert("Course name & price required");
    return;
  }

  if(editRow){
    editRow.cells[1].innerText=name;
    editRow.cells[2].innerText=price;
  }else{
    const table=document.getElementById("courseTable").querySelector("tbody");
    const row=table.insertRow();
    row.innerHTML=`
      <td>${table.rows.length}</td>
      <td>${name}</td>
      <td>${price}</td>
      <td>Active</td>
      <td>
        <button class="action-btn edit" onclick="editCourse(this)">Edit</button>
        <button class="action-btn delete" onclick="deleteCourse(this)">Delete</button>
      </td>`;
  }
  closeModal();
}

function editCourse(btn){
  editRow = btn.closest("tr");
  courseName.value = editRow.cells[1].innerText;
  coursePrice.value = editRow.cells[2].innerText;
  openModal();
}

function deleteCourse(btn){
  if(confirm("Delete this course?")){
    btn.closest("tr").remove();
  }
}
</script>

</body>
</html>
